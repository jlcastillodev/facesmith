name = "facesmith-proxy"
main = "src/index.ts"
compatibility_date = "2024-06-05"

[vars]
AI_PROVIDER = "cloudflare"
AI_ACCOUNT_ID = "<your-account-id>"
AI_MODEL = "@cf/black-forest-labs/flux-1-schnell"
ORIGIN_ALLOW = "http://localhost:4321"

[env.production]
vars = { AI_PROVIDER = "cloudflare" }

# Secrets
# AI_TOKEN is defined via `wrangler secret put AI_TOKEN`
